<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modern Gradient Palettes -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background Circle (Soft Glassmorphic glow) -->
  <circle cx="256" cy="256" r="240" fill="#f8fafc" stroke="#e2e8f0" stroke-width="8"/>
  <circle cx="256" cy="256" r="200" fill="url(#primaryGrad)" filter="url(#glow)" opacity="0.05" />

  <!-- Upward Career Growth Graph Columns (Background element) -->
  <g fill="url(#primaryGrad)" opacity="0.85">
    <rect x="140" y="280" width="36" height="120" rx="8" />
    <rect x="200" y="220" width="36" height="180" rx="8" />
    <rect x="260" y="160" width="36" height="240" rx="8" />
    <rect x="320" y="100" width="36" height="300" rx="8" />
  </g>

  <!-- Upward Trend Line and Arrow -->
  <path d="M 120 340 L 190 280 L 250 200 L 330 110" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 300 110 L 330 110 L 330 140" fill="none" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Academic Graduation Cap (Foreground centerpiece representing guidance and achievement) -->
  <g filter="url(#glow)">
    <!-- Cap Diamond top -->
    <polygon points="256,160 390,210 256,260 122,210" fill="url(#primaryGrad)" stroke="#ffffff" stroke-width="6" stroke-linejoin="round" />
    
    <!-- Cap Base/Under -->
    <path d="M 180,242 L 180,290 C 180,320 332,320 332,290 L 332,242" fill="#0f172a" stroke="#ffffff" stroke-width="4" />
    
    <!-- Tassel / Dây mũ -->
    <path d="M 256,210 L 140,245 L 140,295" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Tassel Fringe -->
    <polygon points="132,295 148,295 140,315" fill="#f59e0b" />
  </g>

  <!-- Central Star of Guidance -->
  <path d="M 256 60 L 262 78 L 280 78 L 266 88 L 272 106 L 256 96 L 240 106 L 246 88 L 232 78 L 250 78 Z" fill="#f59e0b" />
</svg>
